<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>足腰リカバリー特別ご提案シート</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Hiragino Kaku Gothic ProN','Yu Gothic','Meiryo',sans-serif; background:#f0f0f0; }

#formScreen {
  max-width:680px; margin:0 auto; background:white;
  padding:20px 16px; min-height:100vh;
}
#formScreen h1 { color:#1a2f5a; font-size:17px; border-bottom:3px solid #1a2f5a; padding-bottom:8px; margin-bottom:18px; }
.fs { margin-bottom:14px; }
.fs > label { display:block; font-size:13px; font-weight:bold; color:#333; margin-bottom:4px; }
.req { color:#e03a3a; margin-left:3px; }
.fs input,.fs select,.fs textarea {
  width:100%; border:1px solid #ccc; border-radius:6px;
  padding:10px 12px; font-size:16px; font-family:inherit; outline:none;
  -webkit-appearance:none; background:white;
}
.fs textarea { height:68px; resize:none; }
.fs input:focus,.fs select:focus,.fs textarea:focus { border-color:#1a2f5a; }

/* メニューテーブル */
.menu-table { width:100%; border-collapse:collapse; font-size:13px; }
.menu-table th { background:#1a2f5a; color:white; padding:7px 8px; text-align:left; font-weight:normal; font-size:12px; }
.menu-table td { padding:7px 8px; border-bottom:1px solid #e0e0e0; vertical-align:middle; }
.menu-table tr:nth-child(even) td { background:#f8f9fc; }

/* ③ メニューチェックボックス：チェック状態を明確に */
.mcb {
  display:flex; align-items:center; gap:8px; cursor:pointer;
  font-size:14px; font-weight:bold; color:#333;
  padding:4px 8px; border-radius:6px;
  border:2px solid #ddd; transition:all 0.2s;
  -webkit-tap-highlight-color:transparent;
}
.mcb input { display:none; }  /* チェックボックス非表示、代わりにラベルをスタイル */
.mcb .check-icon {
  width:20px; height:20px; border:2px solid #aaa;
  border-radius:4px; display:flex; align-items:center; justify-content:center;
  flex-shrink:0; background:white; font-size:14px; transition:all 0.2s;
}
.mcb.checked {
  background:#1a2f5a; color:white; border-color:#1a2f5a;
}
.mcb.checked .check-icon {
  background:white; border-color:white; color:#1a2f5a; font-weight:bold;
}

/* 目的チップ */
.chips { display:flex; flex-wrap:wrap; gap:6px; margin-top:2px; }
.chip {
  display:inline-flex; align-items:center; gap:4px;
  background:#f0f3fa; border:1px solid #c0cae0;
  border-radius:20px; padding:6px 11px; font-size:13px; cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.chip input { width:14px; height:14px; accent-color:#1a2f5a; }
.chip:has(input:checked) { background:#1a2f5a; color:white; border-color:#1a2f5a; }

/* ④ 印刷ボタン：携帯でも確実に動作するスタイル */
.btn-gen {
  display:block; width:100%;
  background:#1a2f5a; color:white; border:none;
  border-radius:8px; padding:18px; font-size:17px; font-weight:bold;
  cursor:pointer; margin-top:18px;
  -webkit-appearance:none; appearance:none;
  -webkit-tap-highlight-color:rgba(0,0,0,0.2);
  touch-action:manipulation;
  user-select:none; -webkit-user-select:none;
}
.btn-gen:active { background:#0d1f40; transform:scale(0.98); }

/* 印刷シート（画面では非表示）*/
#printSheet { display:none; }

/* 印刷時 */
@media print {
  #formScreen { display:none !important; }
  #printSheet {
    display:block !important;
    margin:0; padding:0; background:white;
  }
  
  @page { size: A4 portrait; margin: 10mm; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    font-family:'Hiragino Kaku Gothic ProN','Yu Gothic','Meiryo',sans-serif;
    -webkit-print-color-adjust:exact; print-color-adjust:exact; background:white;
  }
  .page {
    width:190mm; height:277mm; overflow:hidden;
    display:grid; grid-template-rows:85mm 74mm 76mm 42mm;
  }
  .top-row { display:grid; grid-template-columns:59mm 131mm; overflow:hidden; }
  .logo-col { overflow:hidden; border:1.5px solid #1a2f5a; border-right:none; }
  .logo-col img { width:59mm; height:85mm; object-fit:contain; object-position:center; display:block; }
  .right-col { display:grid; grid-template-rows:35mm 50mm; overflow:hidden; }
  .hdr-info {
    padding:4px 8px; display:grid; grid-template-columns:1fr 1fr;
    gap:2px 8px; align-content:center; background:#f5f7ff;
    border:1.5px solid #1a2f5a; border-bottom:none; overflow:hidden;
  }
  .row { display:flex; align-items:baseline; gap:3px; }
  .lbl { color:#1a2f5a; font-weight:bold; white-space:nowrap; min-width:42px; font-size:13px; }
  .val { color:#111; font-size:15px; border-bottom:1px solid #c0c8d8; flex:1; padding-bottom:1px; }
  .full { grid-column:1/-1; }
  .ftr { background:#f4f6fb; border:1.5px solid #1a2f5a; padding:2mm 2mm; overflow:hidden; }
  .ftr-title { font-size:11px; font-weight:bold; color:#1a2f5a; border-left:3px solid #e8a000; padding-left:4px; margin-bottom:2px; }
  .menu-tbl { width:100%; border-collapse:collapse; font-size:11px; }
  .menu-tbl th { background:#1a2f5a; color:white; padding:2.5px 5px; text-align:left; font-weight:normal; }
  .menu-tbl td { padding:3px 5px; border:1px solid #d0d8e8; vertical-align:middle; }
  .menu-tbl tr:nth-child(even) td { background:#e8edf8; }
  .ck { display:inline-block; background:#1a2f5a; color:white; border-radius:2px; padding:1px 4px; font-size:10px; margin:1px; }
  /* ①② 画像上下5mm余白 */
  .img-cycle {
    display:flex; align-items:center; justify-content:center;
    background:white; overflow:hidden;
    padding:5mm 0;
  }
  .img-cycle img { max-width:100%; max-height:100%; object-fit:contain; }
  .img-explain {
    display:flex; align-items:center; justify-content:center;
    background:white; overflow:hidden;
    padding:5mm 0;
  }
  .img-explain img { max-width:100%; max-height:100%; object-fit:contain; }
  .img-plan {
    display:flex; align-items:center; justify-content:center;
    background:white; overflow:hidden;
  }
  .img-plan img { max-width:100%; max-height:100%; object-fit:contain; }

}
</style>
</head>
<body>

<!-- 入力フォーム -->

      <option>浅草</option><option>みのる</option>

      <tbody>
        <tr>

            <label class="chip"><input type="checkbox" value="歪み"> 歪み</label>
            <label class="chip"><input type="checkbox" value="バランス"> バランス</label>
            <label class="chip"><input type="checkbox" value="可動（スムーズ）"> 可動</label>
            <label class="chip"><input type="checkbox" value="姿勢"> 姿勢</label>
            <label class="chip"><input type="checkbox" value="その他"> その他</label>
          </div></td>
        </tr>
        <tr>
          <td><label class="mcb" id="mcb1" onclick="toggleMenu(1)">
            <span class="check-icon" id="ci1">　</span>
            <input type="checkbox" class="menu-cb" value="EMS" id="cb1">
            EMS
          </label></td>
          <td><div class="chips" id="p1">
            <label class="chip"><input type="checkbox" value="インナーマッスルの柔軟性"> 柔軟性</label>
            <label class="chip"><input type="checkbox" value="安定性"> 安定性</label>
            <label class="chip"><input type="checkbox" value="痛み"> 痛み</label>
            <label class="chip"><input type="checkbox" value="その他"> その他</label>
          </div></td>
        </tr>
        <tr>
          <td><label class="mcb" id="mcb2" onclick="toggleMenu(2)">
            <span class="check-icon" id="ci2">　</span>
            <input type="checkbox" class="menu-cb" value="剥がし・膜トリ" id="cb2">
            剥がし・膜トリ
          </label></td>
          <td><div class="chips" id="p2">
            <label class="chip"><input type="checkbox" value="可動域拡大"> 可動域拡大</label>
            <label class="chip"><input type="checkbox" value="筋膜リリース"> 筋膜リリース</label>
            <label class="chip"><input type="checkbox" value="ストレッチ"> ストレッチ</label>
            <label class="chip"><input type="checkbox" value="巻き肩"> 巻き肩</label>
            <label class="chip"><input type="checkbox" value="O脚"> O脚</label>
            <label class="chip"><input type="checkbox" value="その他"> その他</label>
          </div></td>
        </tr>
        <tr>
          <td><label class="mcb" id="mcb3" onclick="toggleMenu(3)">
            <span class="check-icon" id="ci3">　</span>
            <input type="checkbox" class="menu-cb" value="鍼" id="cb3">
            鍼

            <label class="chip"><input type="checkbox" value="不定愁訴"> 不定愁訴</label>
            <label class="chip"><input type="checkbox" value="自律神経不調"> 自律神経不調</label>
            <label class="chip"><input type="checkbox" value="その他"> その他</label>
          </div></td>
        </tr>
        <tr>
          <td><label class="mcb" id="mcb4" onclick="toggleMenu(4)">
            <span class="check-icon" id="ci4">　</span>
            <input type="checkbox" class="menu-cb" value="頭蓋骨調整" id="cb4">
            頭蓋骨調整
          </label></td>
          <td><div class="chips" id="p4">
            <label class="chip"><input type="checkbox" value="睡眠"> 睡眠</label>
            <label class="chip"><input type="checkbox" value="眼精疲労"> 眼精疲労</label>
            <label class="chip"><input type="checkbox" value="頭痛"> 頭痛</label>
            <label class="chip"><input type="checkbox" value="自律神経不調"> 自律神経不調</label>
            <label class="chip"><input type="checkbox" value="ストレス"> ストレス</label>

            <label class="chip"><input type="checkbox" value="リハビリ"> リハビリ</label>
            <label class="chip"><input type="checkbox" value="連動性"> 連動性</label>
            <label class="chip"><input type="checkbox" value="その他"> その他</label>
          </div></td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- ④ 携帯対応：touchstartとclickの両方でハンドラ登録 -->
  <button class="btn-gen" id="printBtn">📄 提案シートを生成して印刷する</button>
</div>

<script>
// ③ メニュートグル
function toggleMenu(idx) {
  var cb = document.getElementById('cb' + idx);
  var lbl = document.getElementById('mcb' + idx);
  var icon = document.getElementById('ci' + idx);
  cb.checked = !cb.checked;
  if (cb.checked) {
    lbl.classList.add('checked');
    icon.textContent = '✓';
  } else {
    lbl.classList.remove('checked');
    icon.textContent = '　';
  }
}

// ④ 印刷処理（携帯対応：touchend + click 両方）
function doGenerate() {
  var store = document.getElementById('store').value;
  var name  = document.getElementById('patientName').value.trim();
  var staff = document.getElementById('staffName').value.trim();
  var complaint = document.getElementById('complaint').value.trim();

  if (!store) { alert('店舗名を選択してください'); return; }
  if (!name)  { alert('患者様氏名を入力してください'); return; }
  if (!staff) { alert('担当スタッフを入力してください'); return; }

  document.getElementById('o-store').textContent = store;
  document.getElementById('o-staff').textContent = staff;
  document.getElementById('o-name').textContent  = name + ' 様';
  document.getElementById('o-comp').textContent  = complaint || '—';

  var cbs = document.querySelectorAll('.menu-cb');
  var rows = '';
  var rowIdx = 0;
  for (var i = 0; i < cbs.length; i++) {
    if (cbs[i].checked) {
      var pels = document.querySelectorAll('#p' + i + ' input:checked');
      var ps = '';
      if (pels.length === 0) { ps = '<span style="color:#999">—</span>'; }
      else { for (var j = 0; j < pels.length; j++) { ps += '<span class="ck">✓ ' + pels[j].value + '</span>'; } }
      var bg = (rowIdx % 2 === 1) ? 'background:#e8edf8;' : '';
      rows += '<tr style="' + bg + '"><td style="width:80px;padding:3px 5px;border:1px solid #d0d8e8;font-size:11px;font-weight:bold;">' + cbs[i].value + '</td><td style="padding:3px 5px;border:1px solid #d0d8e8;">' + ps + '</td></tr>';
      rowIdx++;
    }
  }
  document.getElementById('o-menus').innerHTML = rows || '<tr><td colspan="2" style="text-align:center;color:#999;padding:4px;font-size:11px">選択なし</td></tr>';

  // 印刷
  window.print();
}

// ボタンにtouchendとclickの両方を登録（携帯で確実に動作）
var btn = document.getElementById('printBtn');
var tapped = false;
btn.addEventListener('touchend', function(e) {
  e.preventDefault();
  tapped = true;
  doGenerate();
});
btn.addEventListener('click', function(e) {
  if (!tapped) { doGenerate(); }
  tapped = false;
});
</script>
